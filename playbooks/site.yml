---
- name: Apply baseline to active infrastructure
  hosts: active_infra
  become: true
  gather_facts: true
  roles:
    - baseline

- name: Configure admin NAT host
  hosts: admin_nodes
  become: true
  gather_facts: true
  roles:
    - admin_nat

- name: Configure MariaDB Galera cluster
  hosts: database_cluster
  become: true
  gather_facts: true
  roles:
    - mariadb_galera

- name: Configure MaxScale
  hosts: database_proxies
  become: true
  gather_facts: true
  roles:
    - maxscale

- name: Configure HAProxy public frontend
  hosts: load_balancers
  become: true
  gather_facts: true
  roles:
    - haproxy

- name: Configure containerized GLPI host
  hosts: container_hosts
  become: true
  gather_facts: true
  roles:
    - podman_glpi
