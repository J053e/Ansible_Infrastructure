- name: Install HAProxy
  package:
    name: haproxy
    state: present

- name: Deploy HAProxy config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  notify: restart haproxy

- name: Enable HAProxy service
  service:
    name: haproxy
    state: started
    enabled: true

- name: Open HTTP on firewalld
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true

- name: Restore SELinux context on HAProxy config
  command: restorecon -R /etc/haproxy
  changed_when: false
