---
- name: Install HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present

- name: Ensure firewalld is enabled and running on haproxy
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Deploy HAProxy config with validation
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: "haproxy -c -f %s"
  notify: restart haproxy

- name: Enable HAProxy service
  ansible.builtin.systemd:
    name: haproxy
    enabled: true

- name: Open HTTP on firewalld
  ansible.posix.firewalld:
    zone: "{{ public_zone }}"
    service: http
    permanent: true
    immediate: true
    state: enabled

- name: Restore SELinux context on HAProxy config
  ansible.builtin.command: restorecon -v /etc/haproxy/haproxy.cfg
  changed_when: false
