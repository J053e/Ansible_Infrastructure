---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ fqdn | default(inventory_hostname + '.' + infra_domain) }}"

- name: Set timezone
  ansible.builtin.timezone:
    name: "{{ timezone }}"

- name: Ensure baseline packages are installed
  ansible.builtin.dnf:
    name:
      - vim
      - nano
      - curl
      - wget
      - bash-completion
      - rsync
      - firewalld
      - chrony
      - python3-libselinux
      - policycoreutils-python-utils
    state: present

- name: Configure chrony client
  ansible.builtin.template:
    src: chrony-client.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chronyd

- name: Ensure chronyd is enabled and running
  ansible.builtin.systemd:
    name: chronyd
    enabled: true
    state: started

- name: Ensure firewalld is enabled and running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Ensure /etc/hosts contains infrastructure names with FQDN first
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE INFRA HOSTS"
    block: |
      192.168.164.1 admin-nat.infra.lab admin-nat
      192.168.164.70 ipa1.infra.lab ipa1
      192.168.164.10 haproxy.infra.lab haproxy
      192.168.164.30 db1.infra.lab db1
      192.168.164.31 db2.infra.lab db2
      192.168.164.40 maxscale.infra.lab maxscale
      192.168.164.60 ctr-host1.infra.lab ctr-host1
      192.168.164.80 mon1.infra.lab mon1
      192.168.165.10 haproxy-app
      192.168.165.60 ctr-host1-app
      192.168.165.80 mon1-app
      192.168.166.30 db1-db
      192.168.166.31 db2-db
      192.168.166.40 maxscale-db
      192.168.166.60 ctr-host1-db
      192.168.166.80 mon1-db
      172.24.133.164 wiki.lab

- name: Remove duplicate ipa1 hosts entry if present
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "192.168.164.70 ipa1.infra.lab ipa1"
    state: absent

- name: Remove wrong ipa1 hosts entry if present
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "192.168.164.70 ipa1 ipa1.infra.lab"
    state: absent

- name: Ensure root SSH directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure root authorized_keys exists
  ansible.builtin.lineinfile:
    path: /root/.ssh/authorized_keys
    create: true
    mode: "0600"
    owner: root
    group: root
    line: "{{ lookup('file', '/root/.ssh/ansible_lab.pub') }}"

- name: Restore SELinux context on root SSH files
  ansible.builtin.command: restorecon -Rv /root/.ssh
  changed_when: false

- name: Ensure sshd is enabled and running
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
