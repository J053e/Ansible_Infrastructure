---
- name: systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart prometheus
  ansible.builtin.systemd:
    name: container-prometheus.service
    state: restarted
    enabled: true
    daemon_reload: true

- name: restart grafana
  ansible.builtin.systemd:
    name: container-grafana.service
    state: restarted
    enabled: true
    daemon_reload: true

- name: restart loki
  ansible.builtin.systemd:
    name: container-loki.service
    state: restarted
    enabled: true
    daemon_reload: true

- name: restart alertmanager
  ansible.builtin.systemd:
    name: container-alertmanager.service
    state: restarted
    enabled: true
    daemon_reload: true

- name: restart blackbox-exporter
  ansible.builtin.systemd:
    name: container-blackbox-exporter.service
    state: restarted
    enabled: true
    daemon_reload: true
