---
- name: Install packages required on admin-nat
  ansible.builtin.dnf:
    name:
      - firewalld
      - tcpdump
      - curl
      - rsync
      - chrony
      - policycoreutils-python-utils
    state: present

- name: Ensure firewalld is enabled and running on admin-nat
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Ensure SSH service is enabled and running on admin-nat
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started

- name: Configure admin-nat as NTP server
  ansible.builtin.template:
    src: chrony-server.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chronyd

- name: Ensure chronyd is enabled and running on admin-nat
  ansible.builtin.systemd:
    name: chronyd
    enabled: true
    state: started

- name: Ensure public interface is assigned to public zone on admin-nat
  ansible.builtin.command: "nmcli connection modify {{ admin_nat_public_connection_name }} connection.zone {{ admin_nat_public_zone }}"
  changed_when: false
  failed_when: false

- name: Ensure management interface is assigned to internal zone on admin-nat
  ansible.builtin.command: "nmcli connection modify {{ admin_nat_mgmt_connection_name }} connection.zone {{ admin_nat_mgmt_zone }}"
  changed_when: false
  failed_when: false

- name: Enable IPv4 forwarding persistently
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true

- name: Enable masquerade on public zone
  ansible.posix.firewalld:
    zone: "{{ admin_nat_public_zone }}"
    masquerade: true
    permanent: true
    immediate: true
    state: enabled

- name: Allow SSH on admin-nat public zone
  ansible.posix.firewalld:
    zone: "{{ admin_nat_public_zone }}"
    service: ssh
    permanent: true
    immediate: true
    state: enabled

- name: Allow SSH on admin-nat management zone
  ansible.posix.firewalld:
    zone: "{{ admin_nat_mgmt_zone }}"
    service: ssh
    permanent: true
    immediate: true
    state: enabled

- name: Allow NTP on admin-nat management zone
  ansible.posix.firewalld:
    zone: "{{ admin_nat_mgmt_zone }}"
    service: ntp
    permanent: true
    immediate: true
    state: enabled

- name: Allow forward from management zone
  ansible.posix.firewalld:
    zone: "{{ admin_nat_mgmt_zone }}"
    forward: true
    permanent: true
    immediate: true
    state: enabled
